spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: saas-ecommerce-test

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: filesystem:../database
    baseline-on-migrate: true

# JWT — em testes, o RsaKeyConfig gera chaves in-memory (veja TestRsaKeyConfig)
jwt:
  expiration: 86400000

# Springdoc desativado nos testes
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
